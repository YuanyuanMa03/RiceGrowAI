[pytest]
# pytest配置文件 - 水稻生长与CH4排放模拟系统

# ==================== 测试发现 ====================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ==================== 输出选项 ====================
addopts =
    # 详细输出
    -v
    # 显示局部变量（失败时）
    -l
    # 显示print输出
    -s
    # 回退格式
    --tb=short
    # 严格标记
    --strict-markers
    # 显示测试覆盖率
    --cov=core
    --cov-report=html:htmlcov
    --cov-report=term-missing
    # 警告设置
    -W ignore::DeprecationWarning

# ==================== 标记定义 ====================
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# ==================== 日志配置 ====================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ==================== 覆盖率配置 ====================
[coverage:run]
source = core
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    setup.py

[coverage:report]
precision = 2
exclude_lines =
    # 排除的行类型
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
